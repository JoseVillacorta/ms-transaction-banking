openapi: 3.0.1
info:
  title: Transaction Management API (WebFlux Functional)
  description: Api para la gestion de transacciones y transferencias bancarias, implementada con Spring WebFlux Functional Endpoints conectada a PostgreSQL mediante R2DBC y Kafka para eventos asincronos.
  version: v1.0.0
servers:
  - url: http://localhost:8080/ms-transaction
    description: URL a traves del API Gateway
  - url: http://localhost:8083
    description: URL directa al Microservicio (Local)
tags:
  - name: Transactions
    description: Operaciones de registro y consulta de transacciones.

components:
  schemas:
    Transaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID unico de la transaccion
          example: 100
        sourceAccountId:
          type: integer
          format: int64
          description: ID de la cuenta origen (puede ser null para depositos)
          example: 1
        destinationAccountId: 
          type: integer
          format: int64
          description: ID de la cuenta destino (puede ser null para retiros)
          example: 2
        amount:
          type: number
          format: double
          description: Monto de la operacion
          example: 150.00
        transactionType:
          type: string
          description: Tipo de operacion (TRANSFER, DEPOSIT, WITHDRAWAL)
          example: "TRANSFER"
        status:
          type: string
          description: Estado actual de la transaccion (PENDING, COMPLETED, FAILED)
          example: "COMPLETED"
        createdAt:
          type: string
          format: date-time
          description: Fecha de creacion de la transaccion
          example: "2026-03-24T15:30:00Z"
      required:
        - amount
        - transactionType
        - status

    TransferRequest:
      type: object
      properties:
        fromAccountId:
          type: integer
          format: int64
          description: ID de la cuenta bancaria de origen
          example: 1
        toAccountId:
          type: integer
          format: int64
          description: ID de la cuenta bancaria de destino
          example: 2
        amount:
          type: number
          format: double
          description: Cantidad de dinero a transferir
          example: 150.00
      required:
        - fromAccountId
        - toAccountId
        - amount

    ApiResponseTransaction:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Transaction'
        message:
          type: string
          example: "Transaction processed successfully"
        status:
          type: integer
          example: 200

    ApiResponseTransactionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        message:
          type: string
          example: "OK"
        status:
          type: integer
          example: 200

    ApiResponseError:
      type: object
      properties:
        data:
          type: object
          nullable: true
          example: null
        message:
          type: string
          example: "Insufficient funds"
        status:
          type: integer
          example: 400

paths:
  /api/v1/transactions:
    post:
      tags:
        - Transactions
      summary: Realizar una transferencia entre cuentas
      operationId: makeTransfer
      requestBody:
        description: Detalles de las cuentas y el monto a transferir
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transferencia procesada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTransaction'
        '400':
          description: Fondos insuficientes, cuentas invalidas o datos erroneos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

  /api/v1/transactions/statement/{accountId}:
    get:
      tags:
        - Transactions
      summary: Obtener el estado de cuenta y movimientos
      operationId: getStatement
      parameters:
        - name: accountId
          in: path
          description: ID interno de la cuenta de la cual se desea ver el historial de transacciones
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lista de transacciones (estado de cuenta) devuelta exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTransactionList'
        '404':
          description: Cuenta no encontrada o sin movimientos previos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
